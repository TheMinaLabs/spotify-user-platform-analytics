version: 2

sources:
  - name: raw
    schema: main
    tables:
      - name: raw_auth_events
        description: "Raw IAM authentication events streamed from the User Platform event bus."
        columns:
          - name: event_id
            tests: [not_null, unique]
          - name: user_id
            tests: [not_null]
          - name: event_type
            tests: [not_null]
          - name: event_ts
            tests: [not_null]

      - name: raw_users
        description: "Raw user account records from the identity store."
        columns:
          - name: user_id
            tests: [not_null, unique]

models:
  - name: stg_auth_events
    description: >
      Cleaned and typed IAM auth events. One row per raw event.
      Adds device_category, is_auth_failure, and is_successful_login flags.
    columns:
      - name: event_id
        tests: [not_null, unique]
      - name: user_id
        tests: [not_null]
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              name: accepted_values_event_type
              arguments:
                values:
                  - login_attempt
                  - login_success
                  - login_failure_bad_password
                  - login_failure_account_locked
                  - mfa_triggered
                  - mfa_success
                  - mfa_failure
                  - mfa_timeout
                  - token_issued
                  - token_refresh
                  - session_active
                  - session_expired
                  - logout
                  - password_reset_requested
                  - password_reset_email_sent
                  - password_reset_completed
                  - password_reset_failed
                  - password_reset_expired
      - name: device_category
        tests:
          - accepted_values:
              name: accepted_values_device_category
              arguments:
                values: [mobile, desktop, web, smart_tv, unknown]
      - name: event_ts
        tests: [not_null]

  - name: stg_users
    description: "Cleaned user account dimension from the identity store."
    columns:
      - name: user_id
        tests: [not_null, unique]
      - name: subscription_tier
        tests:
          - accepted_values:
              name: accepted_values_subscription_tier
              arguments:
                values: [free, premium, unknown]
